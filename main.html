<!DOCTYPE html5>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css"> <!--Chama o CSS principal-->
    
     <style>
     </style>  
</head>

<body>
<div class="flex"> <!--Marca a div principal-->
    <div class="toggleDark" id="toggleDark"> <!--Cria uma div para o botao de modo noturno-->
        <img src="imagens/clear_day_24dp_000000_FILL0_wght400_GRAD0_opsz24.png" class="icon1"></img>
        <!--Coloca as imagens necessárias no botão-->
        <img src="imagens/moon_stars_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.png" class="icon2"></img>
    </div>
    <div class="container" id="container"> <!--Abre o container que assegura os botões de interação-->
        <br>
        <button onclick="toggleHome()" class="caixa" id="sobremim">Sobre mim!</button> 
        <button onclick="toggleForm()" class="caixa" id="formacao">Formação</button>
        <button onclick="togglePort()" class="caixa" id="portifolio">Portifólio</button>
        <button onclick="toggleCont()" class="caixa"  id="contato">Contato</button>
        <!--Botões com classe para estilização unificada, com funções diferentes quando clicados-->
        <br>
    </div>
    <div> 
        <object id="sobremimoculto" class="sobremimoculto" data="sobremim.html" type='text/html' width="100%"></object>
        <object id="formacaooculto" class="formacaooculto" data="formacao.html" type="text/html" width="100%"></object>
        <object id="portifoliooculto" class="portifoliooculto" data="portifolio.html" type="text/html" width="100%"></object>
        <object id="contatooculto" class="contatooculto" data="contato.html" type="text/html" width="100%"></object>
        <!--Institui HTML's diferentes para cada seção do portifólio-->
    </div>
</div>   
<script src="main.js"></script> <!--Chama o script necessário para fazer todos os botões executarem funções-->
</body>
